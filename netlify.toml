[build]
  publish = "."
  functions = "netlify/functions"
  environment = { SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY,ADMIN_EMAIL" }

[functions]
  node_bundler = "esbuild"

# Static file serving — no SPA redirects needed for demo mode
# Each portal has its own HTML file

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(self), geolocation=()"

# HIPAA-relevant: prevent caching of patient data
[[headers]]
  for = "/data/patients/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Pragma = "no-cache"

[[headers]]
  for = "/portal/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store"

# Embeddable widget — must be loadable cross-origin
[[headers]]
  for = "/embed/paloma-embed.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/javascript; charset=utf-8"
